<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lexara Immersive Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #1A1730; /* Forced theme surface from prompt */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .focus-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(87, 78, 177, 0.15) 0%, rgba(26, 23, 48, 0) 70%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-surface": "#302d47",
                      "surface-container-high": "#ebe5ff",
                      "on-error-container": "#93000a",
                      "primary-fixed": "#e4dfff",
                      "primary": "#574eb1",
                      "surface-tint": "#5951b4",
                      "surface-dim": "#dcd6f8",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed-dim": "#c5c0ff",
                      "outline": "#787583",
                      "secondary-fixed-dim": "#3cddc7",
                      "on-secondary-fixed-variant": "#005047",
                      "tertiary-fixed-dim": "#f9bd22",
                      "on-surface-variant": "#474552",
                      "on-secondary": "#ffffff",
                      "surface-variant": "#e5deff",
                      "on-tertiary-fixed": "#261a00",
                      "surface-container-low": "#f6f1ff",
                      "on-tertiary-fixed-variant": "#5c4300",
                      "inverse-on-surface": "#f3eeff",
                      "tertiary-container": "#956e00",
                      "on-primary-container": "#fffbff",
                      "inverse-primary": "#c5c0ff",
                      "background": "#fcf8ff",
                      "on-primary": "#ffffff",
                      "error": "#ba1a1a",
                      "surface-container-highest": "#e5deff",
                      "error-container": "#ffdad6",
                      "on-tertiary-container": "#fffbff",
                      "outline-variant": "#c8c4d4",
                      "surface-bright": "#fcf8ff",
                      "secondary": "#006b5f",
                      "on-background": "#1b1831",
                      "on-secondary-container": "#007165",
                      "on-secondary-fixed": "#00201c",
                      "on-error": "#ffffff",
                      "surface-container": "#f0ebff",
                      "secondary-container": "#62fae3",
                      "surface": "#fcf8ff",
                      "on-primary-fixed-variant": "#41379b",
                      "primary-container": "#7067cc",
                      "secondary-fixed": "#62fae3",
                      "on-surface": "#1b1831",
                      "tertiary": "#765700",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed": "#140067",
                      "tertiary-fixed": "#ffdf9f"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "gutter": "20px",
                      "sm": "12px",
                      "container-max": "1280px",
                      "xs": "4px",
                      "xl": "32px",
                      "lg": "24px",
                      "md": "16px"
              },
              "fontFamily": {
                      "display-lg": ["Plus Jakarta Sans"],
                      "label-sm": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "label-md": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "headline-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
              }
            },
          },
        }
    </script>
</head>
<body class="min-h-screen flex flex-col overflow-hidden text-white selection:bg-primary/30">
<!-- Header / Progress Section -->
<header class="w-full px-gutter pt-xl pb-md max-w-container-max mx-auto z-10">
<div class="flex items-center justify-between mb-base">
<button class="p-2 hover:bg-white/5 rounded-lg transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-outline-variant mb-xs">INTRODUCE STAGE</span>
<span class="font-label-md text-label-md text-primary-fixed-dim">1 / 5 words</span>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
<!-- Progress Bar (Success Teal variant for completions) -->
<div class="w-full h-1.5 bg-white/10 rounded-pill overflow-hidden">
<div class="h-full bg-secondary-fixed-dim w-1/5 rounded-pill transition-all duration-500 ease-out shadow-[0_0_8px_rgba(60,221,199,0.4)]"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-gutter relative z-10">
<!-- Ambient background effect -->
<div class="absolute inset-0 focus-gradient pointer-events-none"></div>
<!-- Asymmetric Word Container -->
<div class="w-full max-w-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="glass-card rounded-xl p-xl flex flex-col items-center text-center">
<!-- Pronunciation Box -->
<div class="mb-xl">
<button class="group relative flex flex-col items-center gap-base transition-transform active:scale-95" id="pronounce-btn">
<div class="w-16 h-16 bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20 group-hover:bg-primary/20 transition-all">
<span class="material-symbols-outlined text-primary-fixed-dim text-3xl">volume_up</span>
</div>
<span class="font-label-md text-label-md text-outline-variant group-hover:text-primary-fixed-dim transition-colors">/əˈfem(ə)rəl/</span>
</button>
</div>
<!-- Word Display -->
<div class="mb-lg">
<h1 class="font-display-lg text-display-lg text-white mb-sm">Ephemeral</h1>
<div class="h-1 w-12 bg-primary rounded-full mx-auto"></div>
</div>
<!-- Definition & Example -->
<div class="space-y-md mb-xl">
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm">
                        Lasting for a <span class="text-white font-semibold">very short time</span>.
                    </p>
<div class="p-md bg-white/5 rounded-lg border border-white/5 italic font-body-md text-body-md text-outline-variant">
                        "The ephemeral joys of summer are always missed when autumn arrives."
                    </div>
</div>
<!-- Actions -->
<div class="w-full space-y-md">
<button class="w-full py-md px-lg bg-primary text-on-primary-container font-label-md text-label-md rounded-lg shadow-[0_4px_12px_rgba(87,78,177,0.3)] hover:brightness-110 active:scale-[0.98] transition-all">
                        Got it
                    </button>
<button class="w-full py-md px-lg bg-transparent border-1.5 border-outline/30 text-outline-variant font-label-md text-label-md rounded-lg hover:border-primary/50 hover:text-white active:scale-[0.98] transition-all flex items-center justify-center gap-base">
<span class="material-symbols-outlined text-[18px]">bookmark_add</span>
                        Add to difficult words
                    </button>
</div>
</div>
</div>
</main>
<!-- Footer Decoration / Visual Interest -->
<footer class="w-full py-xl px-gutter max-w-container-max mx-auto flex justify-center opacity-40">
<div class="flex gap-xl overflow-hidden grayscale contrast-125 mix-blend-screen">
<!-- Asymmetric decorative items representing "ephemeral" nature -->
<div class="w-24 h-24 rounded-full border border-white/10 flex-shrink-0 animate-pulse"></div>
<div class="w-32 h-32 rounded-lg rotate-12 border border-white/5 flex-shrink-0"></div>
<div class="w-20 h-20 rounded-full border border-white/20 flex-shrink-0 translate-y-12"></div>
</div>
</footer>
<!-- Script for micro-interactions -->
<script>
        document.getElementById('pronounce-btn').addEventListener('click', () => {
            const icon = document.querySelector('#pronounce-btn span.material-symbols-outlined');
            icon.classList.add('scale-110');
            setTimeout(() => icon.classList.remove('scale-110'), 200);
            
            // Interaction logic simulation
            const msg = new SpeechSynthesisUtterance('Ephemeral');
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        });
    </script>
<!-- Visual Hint Elements (Floating particles) -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[20%] left-[10%] w-1 h-1 bg-primary-fixed-dim rounded-full opacity-20 animate-ping"></div>
<div class="absolute top-[60%] right-[15%] w-2 h-2 bg-secondary-fixed-dim rounded-full opacity-10 animate-pulse"></div>
<div class="absolute bottom-[10%] left-[30%] w-1.5 h-1.5 bg-primary-container rounded-full opacity-30"></div>
</div>
</body></html>
