<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lexara Word Battle</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0e19;
            color: #e1e4ff;
            overflow-x: hidden;
        }

        .neomorph-raised {
            background: #0b0e19;
            box-shadow: -6px -6px 12px rgba(255, 255, 255, 0.04),
                        6px 6px 12px rgba(0, 0, 0, 0.5);
        }

        .neomorph-inset {
            background: #0b0e19;
            box-shadow: inset -4px -4px 8px rgba(255, 255, 255, 0.03),
                        inset 4px 4px 8px rgba(0, 0, 0, 0.6);
        }

        .neomorph-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neomorph-button:active {
            box-shadow: inset -2px -2px 5px rgba(255, 255, 255, 0.03),
                        inset 2px 2px 5px rgba(0, 0, 0, 0.6);
            transform: scale(0.98);
        }

        .timer-gradient {
            background: linear-gradient(90deg, #7073ff 0%, #af88ff 100%);
        }

        @keyframes pulse-teal {
            0%, 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(20, 184, 166, 0.6); }
        }

        .correct-flash {
            animation: pulse-teal 0.6s ease-in-out;
            border: 2px solid #14b8a6;
        }

        .wrong-flash {
            border: 2px solid #f59e0b;
        }

        .glass-panel {
            background: rgba(15, 19, 34, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-background min-h-screen flex flex-col items-center justify-start overflow-hidden">

<!-- Main Content Area -->
<main class="flex-grow w-full max-w-4xl px-4 py-8 flex flex-col gap-10">

</div>
<div class="absolute -bottom-1 -right-1 bg-tertiary-container text-[10px] font-bold px-2 py-0.5 rounded-full shadow-lg">YOU</div>
</div>
<div class="flex-grow">
<div class="flex justify-between items-end mb-1">

</div>
<div class="w-full h-3 neomorph-inset rounded-full overflow-hidden p-0.5">

<div class="w-10 h-10 rounded-full neomorph-raised flex items-center justify-center font-black text-outline text-xs italic">VS</div>
</div>
<!-- Opponent Stats -->
<div class="flex items-center gap-4 flex-row-reverse">
<div class="relative">
<div class="w-16 h-16 rounded-full neomorph-raised p-1">

</div>
<div class="absolute -bottom-1 -left-1 bg-error-container text-[10px] font-bold px-2 py-0.5 rounded-full shadow-lg">OPP</div>
</div>
<div class="flex-grow text-right">
<div class="flex justify-between items-end mb-1 flex-row-reverse">
<span class="text-sm font-bold text-on-surface">1,220 PTS</span>
<span class="text-[10px] font-medium text-error uppercase tracking-widest">Streak x3</span>
</div>
<div class="w-full h-3 neomorph-inset rounded-full overflow-hidden p-0.5">
<div class="h-full bg-error-dim rounded-full transition-all duration-500 ml-auto" style="width: 55%;"></div>
</div>
</div>
</div>
</section>
<!-- The Word Display -->
<section class="flex-grow flex flex-col items-center justify-center py-12">
<div class="neomorph-inset p-8 md:p-12 rounded-[2.5rem] w-full text-center relative overflow-hidden group">
<!-- Decorative aura -->
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter text-on-surface mb-2">Inexorable</h1>
<p class="text-outline text-sm font-medium uppercase tracking-[0.3em]">Part of Speech: Adjective</p>
<!-- Speed bonus indicator -->
<div class="absolute top-4 right-4 flex items-center gap-1 text-tertiary">
<span class="material-symbols-outlined text-lg" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-xs font-bold">BONUS ACTIVE</span>
</div>
</div>
</section>
<!-- Definition Options (Multiple Choice) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-24">
<button class="neomorph-raised p-6 rounded-2xl text-left neomorph-button group relative overflow-hidden border border-transparent hover:border-outline/20 transition-all duration-300">
<span class="block text-xs font-bold text-outline mb-2 group-hover:text-primary transition-colors">OPTION A</span>
<p class="text-lg font-semibold text-on-surface">Impossible to stop or prevent.</p>
</button>
<button class="neomorph-raised p-6 rounded-2xl text-left neomorph-button group relative overflow-hidden border border-transparent hover:border-outline/20 transition-all duration-300" onclick="triggerEffect(this, 'wrong')">
<span class="block text-xs font-bold text-outline mb-2 group-hover:text-primary transition-colors">OPTION B</span>
<p class="text-lg font-semibold text-on-surface">Easily persuaded or moved by entreaty.</p>
</button>
<button class="neomorph-raised p-6 rounded-2xl text-left neomorph-button group relative overflow-hidden border border-transparent hover:border-outline/20 transition-all duration-300" onclick="triggerEffect(this, 'correct')">
<span class="block text-xs font-bold text-outline mb-2 group-hover:text-primary transition-colors">OPTION C</span>
<p class="text-lg font-semibold text-on-surface">Showing or having a great deal of variety.</p>
</button>
<button class="neomorph-raised p-6 rounded-2xl text-left neomorph-button group relative overflow-hidden border border-transparent hover:border-outline/20 transition-all duration-300">
<span class="block text-xs font-bold text-outline mb-2 group-hover:text-primary transition-colors">OPTION D</span>
<p class="text-lg font-semibold text-on-surface">Lacking flavor; weak or tasteless.</p>
</button>
</section>
</main>
<!-- Battle Action FABs (Manual implementation of shell logic) -->
<div class="fixed bottom-24 right-6 flex flex-col gap-4 z-40">
<div class="group relative">
<div class="absolute right-16 top-1/2 -translate-y-1/2 px-3 py-1 bg-surface-container-high rounded-lg text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">DOUBLE XP</div>

</button>
</div>
<div class="group relative">
<div class="absolute right-16 top-1/2 -translate-y-1/2 px-3 py-1 bg-surface-container-high rounded-lg text-[10px] font-bold text-primary opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">SHIELD ACTIVATED</div>
<button class="w-14 h-14 rounded-full neomorph-raised flex items-center justify-center text-primary-fixed-dim neomorph-button border-2 border-primary-fixed-dim/20">
<span class="material-symbols-outlined" data-icon="shield" style="font-variation-settings: 'FILL' 0;">shield</span>
</button>
</div>
</div>
<!-- Bottom Navigation Shell (From JSON) -->

<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-sm text-[10px]">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-6 py-1 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-label-sm text-[10px]">Learn</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="group">group</span>
<span class="font-label-sm text-[10px]">Social</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-colors active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-sm text-[10px]">Profile</span>
</a>
</nav>
<script>
        // Micro-interactions and Timer Simulation
        let timeLeft = 85;
        const timerBar = document.getElementById('timer-bar');

        const interval = setInterval(() => {
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(interval);
            }
            timerBar.style.width = timeLeft + '%';
            
            // Add urgency color at < 20%
            if (timeLeft < 20) {
                timerBar.classList.remove('timer-gradient');
                timerBar.classList.add('bg-error');
            }
        }, 100);

        function triggerEffect(el, type) {
            if (type === 'correct') {
                el.classList.add('correct-flash');
                setTimeout(() => el.classList.remove('correct-flash'), 600);
            } else {
                el.classList.add('wrong-flash');
                setTimeout(() => el.classList.remove('wrong-flash'), 600);
            }
        }

        // Active state logic for bottom nav is already handled in the static HTML generation 
        // by applying active classes to "Learn" based on the "Word Battle" task intent.
    </script>
</body></html>
